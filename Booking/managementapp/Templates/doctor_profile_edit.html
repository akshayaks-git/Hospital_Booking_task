{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Doctor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4">Update Doctor</h1>

    <form method="post" enctype="multipart/form-data" action="{% url 'update_doctor' doctor.id %}">
        {% csrf_token %}

        <div class="mb-3">
            <label for="name" class="form-label">Doctor Name</label>
            <input type="text" class="form-control" name="name" value="{{ doctor.name }}" required>
        </div>

        <div class="mb-3">
            <label for="doc_spec" class="form-label">Specialization</label>
            <input type="text" class="form-control" name="doc_spec" value="{{ doctor.doc_spec }}" required>
        </div>
          <div class="mb-3">
        <label for="qualification" class="form-label">Qualification</label>
        <input type="text" class="form-control" name="qualification" id="qualification" 
               value="{{ doctor.qualification }}" placeholder="E.g., MBBS, MD, PhD" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ doctor.email }}" required>
        </div>

        <div class="mb-3">
            <label for="phone_number" class="form-label">Phone Number</label>
            <input type="text" class="form-control" name="phone_number" value="{{ doctor.phone_number }}" required>
        </div>

        <div class="mb-3">
            <label for="consultation_fee" class="form-label">Consultation Fee</label>
            <input type="number" step="0.01" class="form-control" name="consultation_fee" value="{{ doctor.consultation_fee }}" required>
        </div>

       

        <div class="mb-3">
            <label for="photo" class="form-label">Profile Photo</label>
            <input type="file" class="form-control" name="photo">
            {% if doctor.photo %}
                <img src="{{ doctor.photo.url }}" class="img-thumbnail mt-2" width="150">
            {% endif %}
        </div>

        <button type="submit" class="btn btn-primary"><i class="bi bi-pencil-square"></i> Update Doctor</button>
        <a href="{% url 'admin_home' %}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>


{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-image: url("{% static 'images/book_appointment.jpg' %}");
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center;
    }

    /* Glass Navbar */
    .navbar {
      backdrop-filter: blur(10px);
      background: rgba(13, 110, 253, 0.75) !important; /* Bootstrap Primary */
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .navbar-brand {
      font-weight: bold;
      font-size: 1.4rem;
      letter-spacing: 1px;
    }

    .nav-link {
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-link:hover {
      color: #ffc107 !important;
    }

    /* Dropdown style */
    .dropdown-menu {
      border-radius: 12px;
      box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- Attractive Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🏥 Doctor Panel</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
  
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          
          <li class="nav-item">
            <a class="nav-link" href="{% url 'doctor_appointments' %}"><i class="bi bi-calendar-check"></i> My Appointments</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'mark_leave' %}"><i class="bi bi-calendar-x"></i> Mark Leave</a>
          </li>

          <!-- Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="settingsDropdown" role="button"
              data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-gear"></i>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="settingsDropdown">
              <li><a class="dropdown-item" href="{% url 'doctor_profile' %}">👤 View Profile</a></li>
              {% comment %} <li><a class="dropdown-item" href="{% url 'edit_profile' %}">✏️ Edit Profile</a></li>
              <li><hr class="dropdown-divider"></li> {% endcomment %}
              <li>
                <form action="{% url 'logout' %}" method="post">
                  {% csrf_token %}
                  <button type="submit" class="dropdown-item text-danger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                  </button>
                </form>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

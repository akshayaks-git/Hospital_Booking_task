{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile</title>

    <!-- Bootstrap CSS for buttons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(to right, #dbeafe, #f1f5f9);
            font-family: Arial, sans-serif;
        }

        .profile-card {
            border-radius: 1rem;
            background-color: #ffffff;
        }

        .label {
            font-weight: 600;
            color: #6b7280; /* Tailwind gray-500 */
        }

        .value {
            font-size: 16px;
            color: #111827; /* Tailwind gray-900 */
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

    <div class="container mx-auto px-4">

        <div class="flex justify-center">

            <div class="profile-card shadow-xl p-8 w-full max-w-3xl">

                <!-- Profile Header -->
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-bold text-gray-800">{{ view.name }}</h2>
                    <p class="text-gray-500">@{{ data.username }}</p>
                </div>

                <hr class="my-6 border-gray-300">

                <!-- Patient Details Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <p class="label">Email</p>
                        <p class="value">{{ view.email }}</p>
                    </div>

                    <div>
                        <p class="label">Phone Number</p>
                        <p class="value">{{ view.phone_number }}</p>
                    </div>

                    <div>
                        <p class="label">Address</p>
                        <p class="value">{{ view.address }}</p>
                    </div>

                    <div>
                        <p class="label">Date of Birth</p>
                        <p class="value">{{ view.date_of_birth }}</p>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="text-center mt-8">
                    <a href="/patient_home" class="btn btn-primary px-6 me-3">Dashboard</a>
                </div>

            </div>

        </div>

    </div>

</body>
</html>

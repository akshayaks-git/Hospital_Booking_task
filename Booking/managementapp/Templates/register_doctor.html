

{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doctor Registration</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  .card {
    background: #ffffffee;
    border: none;
    border-radius: 20px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
    padding: 30px;
  }

  h2 {
    text-align: center;
    font-weight: 700;
    color: #d63384;
    margin-bottom: 25px;
  }

  .form-label {
    font-weight: 600;
    color: #333;
  }

  .btn-submit {
    background: linear-gradient(to right, #d63384, #6610f2);
    border: none;
    border-radius: 30px;
    color: white;
    padding: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
  }

  .btn-submit:hover {
    background: linear-gradient(to right, #6610f2, #d63384);
  }
</style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
      <div class="card">

        <h2><b>Doctor Registration<b></h2>

        <!-- ✅ Success message -->
        {% if success %}
        <div class="alert alert-success text-center">
          🎉 Doctor registered successfully!
        </div>
        {% endif %}

        <!-- ✅ Form -->
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-1">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="Enter full name" required>
          </div>

          <div class="mb-1">
            <label for="doc_spec" class="form-label">Specialization</label>
            <input type="text" id="doc_spec" name="doc_spec" class="form-control" placeholder="Enter specialization" required>
          </div>

          <div class="mb-1">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="doctor@example.com">
          </div>

          <div class="mb-1">
            <label for="phone_number" class="form-label">Phone Number</label>
            <input type="text" id="phone_number" name="phone_number" class="form-control" placeholder="Enter phone number" required>
          </div>

          <div class="mb-1">
            <label for="qualification" class="form-label">Qualification</label>
            <input type="text" id="qualification" name="qualification" class="form-control" placeholder="E.g., MBBS, MD, PhD" required>
          </div>

          <div class="mb-1">
            <label for="medical_department" class="form-label">Department</label>
            <select id="medical_department" name="medical_department" class="form-select" required>
              <option value="" disabled selected>Select Department</option>
              <option value="Radiology">Radiology</option>
              <option value="Cardiology">Cardiology</option>
              <option value="Neurology">Neurology</option>
              <option value="Psychology">Psychology</option>
            </select>
          </div>

          <div class="mb-1">
            <label for="consultation_fee" class="form-label">Consultation Fee</label>
            <input type="number" id="consultation_fee" name="consultation_fee" class="form-control" placeholder="500" step="0.01" required>
          </div>

          {% comment %} <div class="mb-3">
            <label for="available_days" class="form-label">Available Days</label>
            <select id="available_days" name="available_days" class="form-select" multiple required>
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
              <option value="Saturday">Saturday</option>
              <option value="Sunday">Sunday</option>
            </select>
            <small class="text-muted">Hold Ctrl (Cmd on Mac) to select multiple days.</small>
          </div>
 {% endcomment %}
          <div class="mb-1">
            <label for="photo" class="form-label">Upload Photo</label>
            <input type="file" id="photo" name="photo" class="form-control">
          </div>

          <div class="mb-1">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
          </div>

          <div class="mb-1">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-submit">Register Doctor</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
